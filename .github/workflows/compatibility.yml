name: PrestaShop Compatibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ================================================================
  # 1. PHP Lint — Syntax check
  # ================================================================
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    name: "PHP Lint (${{ matrix.php }})"
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: PHP Syntax Check
        run: |
          ERRORS=0
          while IFS= read -r -d '' file; do
            php -l -n "$file" 2>&1 | grep -v "No syntax errors" && ERRORS=$((ERRORS + 1))
          done < <(find . -type f -name '*.php' ! -path './vendor/*' ! -path './tests/*' -print0)
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS file(s) with syntax errors"
            exit 1
          fi
          echo "All PHP files valid"

  # ================================================================
  # 2. PHP CS Fixer — Coding Standards
  # ================================================================
  cs-fixer:
    runs-on: ubuntu-latest
    name: "PHP CS Fixer"
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - name: Install dependencies
        run: composer install --dev --no-interaction --no-progress
      - name: Run PHP CS Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no

  # ================================================================
  # 3. Composer Validate
  # ================================================================
  composer-validate:
    runs-on: ubuntu-latest
    name: "Composer Validate"
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Validate composer.json
        run: composer validate --no-check-all --no-check-publish

  # ================================================================
  # 3. Unit Tests — PHPUnit
  # ================================================================
  unit-tests:
    runs-on: ubuntu-latest
    needs: [php-lint]
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    name: "Unit Tests (PHP ${{ matrix.php }})"
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
      - name: Install dependencies
        run: composer install --dev --no-interaction --no-progress
      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox

  # ================================================================
  # 4. Twig Lint — Template validation
  # ================================================================
  twig-lint:
    runs-on: ubuntu-latest
    name: "Twig Lint"
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - name: Install dependencies
        run: composer install --no-interaction --no-progress
      - name: Install Twig
        run: composer require --dev twig/twig:^3.0 --no-interaction --no-progress
      - name: Lint Twig templates
        run: |
          ERRORS=0
          for f in $(find views/ -name '*.twig'); do
            php -r "
              require 'vendor/autoload.php';
              \$loader = new \Twig\Loader\ArrayLoader(['test' => file_get_contents('$f')]);
              \$twig = new \Twig\Environment(\$loader);
              \$twig->addFunction(new \Twig\TwigFunction('path', function() { return ''; }));
              \$twig->addFunction(new \Twig\TwigFunction('url', function() { return ''; }));
              try {
                \$twig->parse(\$twig->tokenize(new \Twig\Source(file_get_contents('$f'), '$f')));
                echo 'OK: $f' . PHP_EOL;
              } catch (\Twig\Error\SyntaxError \$e) {
                echo '::error file=$f::' . \$e->getMessage() . PHP_EOL;
                exit(1);
              }
            " || ERRORS=$((ERRORS + 1))
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS template(s) with syntax errors"
            exit 1
          fi
          echo "All Twig templates valid"

  # ================================================================
  # 5. Integration Test — PrestaShop 8.x + LiteSpeed
  # ================================================================
  integration-ps8:
    runs-on: ubuntu-latest
    needs: [php-lint, composer-validate, unit-tests]
    name: "PS 8 + LiteSpeed"

    services:
      mysql:
        image: mariadb:11.4
        env:
          MYSQL_ROOT_PASSWORD: prestashop
          MYSQL_DATABASE: prestashop
          MYSQL_USER: prestashop
          MYSQL_PASSWORD: prestashop
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout module
        uses: actions/checkout@v4

      - name: Start LiteSpeed + PHP 8.1
        run: |
          docker run -d --name lsws \
            --network host \
            -e TZ=UTC \
            litespeedtech/litespeed:6.3.4-lsphp81

          # Wait for LiteSpeed to start
          sleep 5
          docker exec lsws ls /usr/local/lsws/bin/lswsctrl

      - name: Install PrestaShop 8.2
        run: |
          # Download and extract PrestaShop
          docker exec lsws bash -c "
            apt-get update -qq && apt-get install -y -qq unzip curl mariadb-client > /dev/null 2>&1

            cd /var/www/vhosts/localhost/html 2>/dev/null || mkdir -p /var/www/vhosts/localhost/html
            cd /var/www/vhosts/localhost/html

            curl -sSL https://github.com/PrestaShop/PrestaShop/releases/download/8.2.3/prestashop_8.2.3.zip -o ps.zip
            unzip -q ps.zip
            if [ -f prestashop.zip ]; then unzip -qo prestashop.zip; fi
            rm -f ps.zip prestashop.zip

            # Install PrestaShop via CLI
            php install/index_cli.php \
              --domain=localhost \
              --db_server=127.0.0.1 \
              --db_name=prestashop \
              --db_user=prestashop \
              --db_password=prestashop \
              --prefix=ps_ \
              --email=test@test.com \
              --password=Test1234! \
              --ssl=0 \
              --name='Test Shop' \
              --language=en \
              --country=US

            rm -rf install/
            chown -R nobody:nogroup /var/www/vhosts/localhost/html
          "

      - name: Copy module into PrestaShop
        run: |
          docker exec lsws mkdir -p /var/www/vhosts/localhost/html/modules/litespeedcache
          docker cp . lsws:/var/www/vhosts/localhost/html/modules/litespeedcache/
          docker exec lsws chown -R nobody:nogroup /var/www/vhosts/localhost/html/modules/litespeedcache

      - name: Install module
        run: |
          docker exec lsws php /var/www/vhosts/localhost/html/bin/console prestashop:module install litespeedcache 2>/dev/null || \
          docker exec lsws php -r "
            require '/var/www/vhosts/localhost/html/config/config.inc.php';
            \$module = Module::getInstanceByName('litespeedcache');
            if (!\$module) { echo '::error::Module class not found'; exit(1); }
            if (!\$module->install()) { echo '::error::install() failed'; exit(1); }
            echo 'Module installed: v' . \$module->version;
          "

      - name: Verify module active
        run: |
          docker exec lsws php -r "
            require '/var/www/vhosts/localhost/html/config/config.inc.php';
            \$m = Module::getInstanceByName('litespeedcache');
            if (!\$m || !\$m->active) { echo '::error::Module not active'; exit(1); }
            echo 'Module active: v' . \$m->version;
          "

      - name: Verify admin tabs
        run: |
          docker exec lsws php -r "
            require '/var/www/vhosts/localhost/html/config/config.inc.php';
            \$id = (int) Tab::getIdFromClassName('AdminLiteSpeedCache');
            if (!\$id) { echo '::error::Root tab not found'; exit(1); }
            \$lang = (int) Configuration::get('PS_LANG_DEFAULT');
            \$tabs = Tab::getTabs(\$lang, \$id);
            echo 'Root tab ID=' . \$id . ' with ' . count(\$tabs) . ' children';
          "

      - name: Verify configuration stored
        run: |
          docker exec lsws php -r "
            require '/var/www/vhosts/localhost/html/config/config.inc.php';
            foreach (['LITESPEED_CACHE_GLOBAL', 'LITESPEED_CACHE_SHOP'] as \$key) {
              \$v = Configuration::getGlobalValue(\$key) ?: Configuration::get(\$key);
              if (!\$v || !is_array(json_decode(\$v, true))) {
                echo '::error::Missing or invalid config: ' . \$key; exit(1);
              }
            }
            echo 'Configuration OK';
          "

      - name: Verify LiteSpeed cache headers
        run: |
          # Check that LiteSpeed serves pages (not Apache)
          HEADERS=$(curl -sI http://localhost/ 2>/dev/null | head -20)
          echo "$HEADERS"
          if echo "$HEADERS" | grep -qi "LiteSpeed\|LSWS"; then
            echo "LiteSpeed confirmed"
          else
            echo "::warning::LiteSpeed headers not detected (may need vhost config)"
          fi

      - name: Test uninstall + reinstall
        run: |
          docker exec lsws php -r "
            require '/var/www/vhosts/localhost/html/config/config.inc.php';
            \$m = Module::getInstanceByName('litespeedcache');
            if (!\$m->uninstall()) { echo '::error::uninstall failed'; exit(1); }
            echo 'Uninstalled OK' . PHP_EOL;
            \$m2 = Module::getInstanceByName('litespeedcache');
            if (!\$m2->install()) { echo '::error::reinstall failed'; exit(1); }
            echo 'Reinstalled OK';
          "

      - name: Verify front-end not broken
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/)
          echo "Front-end HTTP: $HTTP_CODE"
          if echo "$HTTP_CODE" | grep -qE "^(200|301|302)$"; then
            echo "Front-end OK"
          elif echo "$HTTP_CODE" | grep -qE "^5"; then
            echo "::error::Server error $HTTP_CODE"
            exit 1
          fi

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== LiteSpeed error log ==="
          docker exec lsws tail -30 /usr/local/lsws/logs/error.log 2>/dev/null || true
          echo "=== PHP error log ==="
          docker exec lsws tail -20 /var/www/vhosts/localhost/html/var/logs/dev.log 2>/dev/null || true
          docker logs lsws --tail 30 2>/dev/null || true

  # ================================================================
  # 6. Integration Test — PrestaShop 9.x + LiteSpeed
