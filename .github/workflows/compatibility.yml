name: PrestaShop Compatibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ================================================================
  # 1. PHP Lint — Syntax check
  # ================================================================
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
    name: "PHP Lint (${{ matrix.php }})"
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: PHP Syntax Check
        run: |
          ERRORS=0
          while IFS= read -r -d '' file; do
            php -l -n "$file" 2>&1 | grep -v "No syntax errors" && ERRORS=$((ERRORS + 1))
          done < <(find . -type f -name '*.php' ! -path './vendor/*' ! -path './tests/*' -print0)
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS file(s) with syntax errors"
            exit 1
          fi
          echo "All PHP files valid"

  # ================================================================
  # 2. PHP CS Fixer — Coding Standards
  # ================================================================
  cs-fixer:
    runs-on: ubuntu-latest
    name: "PHP CS Fixer"
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - name: Install dependencies
        run: composer install --dev --no-interaction --no-progress
      - name: Run PHP CS Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no

  # ================================================================
  # 3. Composer Validate
  # ================================================================
  composer-validate:
    runs-on: ubuntu-latest
    name: "Composer Validate"
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Validate composer.json
        run: composer validate --no-check-all --no-check-publish

  # ================================================================
  # 4. Unit Tests — PHPUnit (8.1+ required by PHPUnit 10)
  # ================================================================
  unit-tests:
    runs-on: ubuntu-latest
    needs: [php-lint]
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    name: "Unit Tests (PHP ${{ matrix.php }})"
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
      - name: Install dependencies
        run: composer install --dev --no-interaction --no-progress
      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox

  # ================================================================
  # 5. Twig Lint — Template validation
  # ================================================================
  twig-lint:
    runs-on: ubuntu-latest
    name: "Twig Lint"
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - name: Install dependencies
        run: composer install --no-interaction --no-progress
      - name: Install Twig
        run: composer require --dev twig/twig:^3.0 --no-interaction --no-progress
      - name: Lint Twig templates
        run: |
          ERRORS=0
          for f in $(find views/ -name '*.twig'); do
            php -r "
              require 'vendor/autoload.php';
              \$loader = new \Twig\Loader\ArrayLoader(['test' => file_get_contents('$f')]);
              \$twig = new \Twig\Environment(\$loader);
              foreach (['path', 'url', 'form_widget', 'form_errors', 'form_start', 'form_end', 'form_row', 'form_rest'] as \$fn) {
                \$twig->addFunction(new \Twig\TwigFunction(\$fn, function() { return ''; }));
              }
              try {
                \$twig->parse(\$twig->tokenize(new \Twig\Source(file_get_contents('$f'), '$f')));
                echo 'OK: $f' . PHP_EOL;
              } catch (\Twig\Error\SyntaxError \$e) {
                echo '::error file=$f::' . \$e->getMessage() . PHP_EOL;
                exit(1);
              }
            " || ERRORS=$((ERRORS + 1))
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS template(s) with syntax errors"
            exit 1
          fi
          echo "All Twig templates valid"
